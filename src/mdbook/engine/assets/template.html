<!DOCTYPE html>
<html lang="en" data-theme="{{DEFAULT_THEME}}" data-default-theme="{{DEFAULT_THEME}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
{{STYLE}}
</style>
</head>
<body>
<header class="topbar">
  <button class="icon-btn menu-btn" type="button" aria-label="Menu">&#9776;</button>
  <span class="topbar-title">{{TITLE}}</span>
  <input type="search" class="search" placeholder="Search…" aria-label="Search" autocomplete="off">
  <button class="icon-btn theme-btn" type="button" aria-label="Toggle theme">&#9788;</button>
</header>
<div class="layout">
  <nav class="sidebar" aria-label="Navigation">
    {{SIDEBAR}}
  </nav>
  <div class="backdrop"></div>
  <main class="content">
    {{CONTENT}}
  </main>
</div>
<script>
{{SCRIPT}}
</script>
</body>
</html>
